name: Nike Mind 001 Stock Monitor

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: nike-monitor
  cancel-in-progress: false

jobs:
  check-stock:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Chequear stock
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          CALLMEBOT_PHONE: ${{ secrets.CALLMEBOT_PHONE }}
          CALLMEBOT_APIKEY: ${{ secrets.CALLMEBOT_APIKEY }}
        run: python monitor.py

      - name: Guardar estado
        run: |
          git config user.name "stock-bot"
          git config user.email "bot@users.noreply.github.com"
          git add state.json || true
          git diff --cached --quiet || git commit -m "update state [skip ci]"
          git push || true
